<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NexaMind{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0e14;
            --bg-panel: #121821;
            --bg-elevated: #1a232f;
            --border: #243040;
            --text-primary: #e6edf3;
            --text-muted: #7d8896;
            --accent: #2dd4bf;
            --accent-dim: #14b8a6;
            --danger: #f87171;
            --warning: #fbbf24;
            --ok: #34d399;
            --info: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .mono { font-family: 'IBM Plex Mono', monospace; }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 240px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            padding: 24px 0;
        }

        .brand {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .brand-logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo::before {
            content: "";
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 2px;
            box-shadow: 0 0 12px var(--accent);
        }

        .brand-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 4px;
        }

        .nav-section {
            padding: 0 12px;
            flex: 1;
        }

        .nav-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            padding: 16px 12px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--bg-elevated);
            color: var(--accent);
        }

        .nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }

        .sidebar-footer {
            padding: 16px 24px 0;
            border-top: 1px solid var(--border);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-dim), var(--info));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--bg-deep);
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 0.85rem; font-weight: 600; }
        .user-role { font-size: 0.7rem; color: var(--text-muted); }

        .logout-link {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-decoration: none;
            margin-top: 12px;
            display: inline-block;
        }
        .logout-link:hover { color: var(--danger); }

        /* ===== Main content ===== */
        .main {
            margin-left: 240px;
            flex: 1;
            padding: 32px 40px;
            max-width: 1400px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* ===== Cards ===== */
        .grid { display: grid; gap: 20px; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .stat-card { position: relative; overflow: hidden; }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }
        .stat-value {
            font-size: 2.4rem;
            font-weight: 700;
            margin-top: 8px;
            font-family: 'IBM Plex Mono', monospace;
        }
        .stat-card.accent .stat-value { color: var(--accent); }
        .stat-card.danger .stat-value { color: var(--danger); }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ===== Table ===== */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .data-table tr:last-child td { border-bottom: none; }

        /* ===== Badges ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-ok { background: rgba(52, 211, 153, 0.12); color: var(--ok); }
        .badge-warning { background: rgba(251, 191, 36, 0.12); color: var(--warning); }
        .badge-danger { background: rgba(248, 113, 113, 0.12); color: var(--danger); }
        .badge-info { background: rgba(96, 165, 250, 0.12); color: var(--info); }
        .badge-muted { background: var(--bg-elevated); color: var(--text-muted); }

        /* ===== Progress bar ===== */
        .progress {
            width: 100%;
            height: 6px;
            background: var(--bg-elevated);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 900px) {
            .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; }
            .main { margin-left: 0; padding: 20px; }
            .grid-3, .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">NexaMind</div>
            <div class="brand-sub">Security Portal</div>
        </div>
        <nav class="nav-section">
            <div class="nav-label">Surveillance</div>
            <a href="/dashboard" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
                <span class="icon">▣</span> Tableau de bord
            </a>
            <a href="/alertes" class="nav-item {% if active == 'alertes' %}active{% endif %}">
                <span class="icon">⚠</span> Alertes
            </a>
            <div class="nav-label">Prestations</div>
            <a href="/audits" class="nav-item {% if active == 'audits' %}active{% endif %}">
                <span class="icon">◈</span> Mes audits
            </a>
            <a href="/devis" class="nav-item {% if active == 'devis' %}active{% endif %}">
                <span class="icon">▤</span> Devis
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">{{ user.username[0]|upper }}</div>
                <div class="user-info">
                    <div class="user-name">{{ user.username }}</div>
                    <div class="user-role">{{ user.company }}</div>
                </div>
            </div>
            <a href="/logout" class="logout-link">↩ Se déconnecter</a>
        </div>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
