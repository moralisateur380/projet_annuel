<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 800" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
      .label { font-size: 13px; fill: #ffffff; font-weight: 600; }
      .sublabel { font-size: 10px; fill: #cbd5e1; }
      .ip { font-size: 10px; fill: #2dd4bf; font-family: 'Courier New', monospace; }
      .zone-label { font-size: 12px; font-weight: 700; fill: #64748b; }
      .note { font-size: 11px; fill: #475569; }
      .owner { font-size: 9px; fill: #fbbf24; font-weight: 600; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1050" height="800" fill="#f8fafc"/>
  <text x="525" y="36" text-anchor="middle" class="title">NexaMind — Architecture Complète</text>
  <text x="525" y="56" text-anchor="middle" class="note">OVH Kimsufi · Proxmox VE 9 · 51.77.52.56 · équipe Victor/Jacques/Abdoul/Marwane</text>

  <!-- Internet -->
  <ellipse cx="525" cy="100" rx="70" ry="26" fill="#1e293b"/>
  <text x="525" y="105" text-anchor="middle" class="label">Internet</text>

  <line x1="525" y1="126" x2="525" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="148" class="ip">vmbr0 (WAN)</text>

  <!-- pfSense -->
  <rect x="400" y="162" width="250" height="62" rx="8" fill="#dc2626"/>
  <text x="525" y="186" text-anchor="middle" class="label">pfSense (VM 100)</text>
  <text x="525" y="201" text-anchor="middle" class="sublabel">Firewall · NAT · OpenVPN</text>
  <text x="525" y="215" text-anchor="middle" class="ip">LAN 192.168.20.1</text>
  <text x="640" y="174" text-anchor="end" class="owner">ABDOUL</text>

  <!-- VPN -->
  <rect x="720" y="168" width="180" height="50" rx="8" fill="#7c3aed"/>
  <text x="810" y="189" text-anchor="middle" class="label">VPN OpenVPN</text>
  <text x="810" y="205" text-anchor="middle" class="ip">10.10.10.0/24</text>
  <line x1="650" y1="193" x2="718" y2="193" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>

  <line x1="525" y1="224" x2="525" y2="262" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="247" class="ip">vmbr2 (LAN)</text>

  <text x="60" y="292" class="zone-label">RÉSEAU LAN — 192.168.20.0/24</text>
  <line x1="60" y1="300" x2="990" y2="300" stroke="#cbd5e1" stroke-width="3"/>

  <!-- Rangée 1 -->
  <!-- AD -->
  <line x1="130" y1="300" x2="130" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="55" y="342" width="150" height="66" rx="8" fill="#0891b2"/>
  <text x="130" y="365" text-anchor="middle" class="label">Active Directory</text>
  <text x="130" y="380" text-anchor="middle" class="sublabel">srv-ad-1 (104)</text>
  <text x="130" y="394" text-anchor="middle" class="ip">192.168.20.10</text>
  <text x="195" y="356" text-anchor="end" class="owner">JACQUES</text>

  <!-- Passbolt -->
  <line x1="290" y1="300" x2="290" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="215" y="342" width="150" height="66" rx="8" fill="#0891b2"/>
  <text x="290" y="365" text-anchor="middle" class="label">Passbolt</text>
  <text x="290" y="380" text-anchor="middle" class="sublabel">srv-passbolt-1 (103)</text>
  <text x="290" y="394" text-anchor="middle" class="ip">192.168.20.x</text>
  <text x="355" y="356" text-anchor="end" class="owner">MARWANE</text>

  <!-- Suricata -->
  <line x1="450" y1="300" x2="450" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="375" y="342" width="150" height="66" rx="8" fill="#d97706"/>
  <text x="450" y="365" text-anchor="middle" class="label">Suricata IDS</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel">srv-soc-1 (107)</text>
  <text x="450" y="394" text-anchor="middle" class="ip">192.168.20.x</text>
  <text x="515" y="356" text-anchor="end" class="owner">MARWANE</text>

  <!-- Web -->
  <line x1="610" y1="300" x2="610" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="535" y="342" width="150" height="66" rx="8" fill="#16a34a"/>
  <text x="610" y="365" text-anchor="middle" class="label">Portail Web</text>
  <text x="610" y="380" text-anchor="middle" class="sublabel">srv-web-1 (200)</text>
  <text x="610" y="394" text-anchor="middle" class="ip">192.168.20.20</text>
  <text x="675" y="356" text-anchor="end" class="owner">VICTOR</text>

  <!-- Wazuh -->
  <line x1="770" y1="300" x2="770" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="695" y="342" width="150" height="66" rx="8" fill="#ea580c"/>
  <text x="770" y="365" text-anchor="middle" class="label">SOC Wazuh</text>
  <text x="770" y="380" text-anchor="middle" class="sublabel">srv-wazuh-1 (201)</text>
  <text x="770" y="394" text-anchor="middle" class="ip">192.168.20.22</text>
  <text x="835" y="356" text-anchor="end" class="owner">VICTOR</text>

  <!-- Kali -->
  <line x1="910" y1="300" x2="910" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="855" y="342" width="130" height="66" rx="8" fill="#1e293b"/>
  <text x="920" y="365" text-anchor="middle" class="label">Kali (attaque)</text>
  <text x="920" y="380" text-anchor="middle" class="sublabel">srv-kali-1 (à créer)</text>
  <text x="920" y="394" text-anchor="middle" class="ip">Red Team</text>
  <text x="978" y="356" text-anchor="end" class="owner">MARWANE</text>

  <!-- Rangée 2 -->
  <line x1="290" y1="300" x2="290" y2="450" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <rect x="215" y="452" width="150" height="60" rx="8" fill="#2563eb"/>
  <text x="290" y="476" text-anchor="middle" class="label">Client Windows</text>
  <text x="290" y="491" text-anchor="middle" class="sublabel">client-win-1 (106)</text>
  <text x="290" y="505" text-anchor="middle" class="sublabel">joint au domaine</text>
  <text x="355" y="466" text-anchor="end" class="owner">JACQUES</text>

  <rect x="450" y="452" width="320" height="60" rx="8" fill="#94a3b8"/>
  <text x="610" y="476" text-anchor="middle" class="label">Templates (pour cloner)</text>
  <text x="610" y="491" text-anchor="middle" class="sublabel">srv-debian-template (101) · srv-win10-template (102)</text>
  <text x="610" y="505" text-anchor="middle" class="sublabel">créés par Victor</text>

  <!-- Flux SOC -->
  <rect x="55" y="560" width="930" height="210" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="75" y="588" class="zone-label" fill="#dc2626">FONCTIONNEMENT DU SOC (détection d'attaque)</text>

  <text x="75" y="615" class="note">1. Kali lance une attaque (brute-force) sur le portail web (srv-web-1)</text>
  <text x="75" y="638" class="note">2. nginx logge les tentatives · l'agent Wazuh envoie les logs au SOC (srv-wazuh-1)</text>
  <text x="75" y="661" class="note">3. Wazuh détecte le brute-force (règle custom niveau 10) et génère une alerte</text>
  <text x="75" y="684" class="note">4. Suricata (srv-soc-1) détecte aussi les scans réseau en parallèle</text>
  <text x="75" y="707" class="note">5. L'alerte remonte dans le portail NexaMind (page Alertes)</text>
  <text x="75" y="730" class="note">6. L'IA Claude analyse l'alerte en français et recommande une action</text>
  <text x="75" y="753" class="note" fill="#16a34a" font-weight="600">✓ La chaîne 1→3 et 5 fonctionne déjà (testée). 4 et 6 = en cours.</text>
</svg>
