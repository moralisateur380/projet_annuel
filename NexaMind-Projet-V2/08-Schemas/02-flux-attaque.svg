<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
      .box-label { font-size: 14px; font-weight: 700; fill: #ffffff; }
      .box-sub { font-size: 11px; fill: #e2e8f0; }
      .step { font-size: 13px; fill: #1e293b; font-weight: 600; }
      .step-num { font-size: 16px; font-weight: 700; fill: #ffffff; }
    </style>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrg" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="500" y="40" text-anchor="middle" class="title">Flux d'attaque et de détection</text>

  <!-- Kali -->
  <rect x="40" y="100" width="180" height="90" rx="10" fill="#1e293b"/>
  <text x="130" y="135" text-anchor="middle" class="box-label">KALI LINUX</text>
  <text x="130" y="155" text-anchor="middle" class="box-sub">srv-kali-1</text>
  <text x="130" y="172" text-anchor="middle" class="box-sub">nmap · nikto · hydra</text>

  <!-- Portail -->
  <rect x="410" y="100" width="180" height="90" rx="10" fill="#16a34a"/>
  <text x="500" y="135" text-anchor="middle" class="box-label">PORTAIL WEB</text>
  <text x="500" y="155" text-anchor="middle" class="box-sub">srv-web-1</text>
  <text x="500" y="172" text-anchor="middle" class="box-sub">NexaMind + nginx</text>

  <!-- Wazuh -->
  <rect x="780" y="100" width="180" height="90" rx="10" fill="#ea580c"/>
  <text x="870" y="135" text-anchor="middle" class="box-label">SOC WAZUH</text>
  <text x="870" y="155" text-anchor="middle" class="box-sub">srv-wazuh-1</text>
  <text x="870" y="172" text-anchor="middle" class="box-sub">SIEM + règles</text>

  <!-- Flèche attaque Kali -> Portail -->
  <line x1="220" y1="145" x2="405" y2="145" stroke="#dc2626" stroke-width="3" marker-end="url(#arr)"/>
  <circle cx="312" cy="145" r="14" fill="#dc2626"/>
  <text x="312" y="150" text-anchor="middle" class="step-num">1</text>

  <!-- Flèche logs Portail -> Wazuh -->
  <line x1="590" y1="145" x2="775" y2="145" stroke="#16a34a" stroke-width="3" marker-end="url(#arrg)"/>
  <circle cx="682" cy="145" r="14" fill="#16a34a"/>
  <text x="682" y="150" text-anchor="middle" class="step-num">2</text>

  <!-- Dashboard -->
  <rect x="780" y="290" width="180" height="80" rx="10" fill="#1d4ed8"/>
  <text x="870" y="322" text-anchor="middle" class="box-label">DASHBOARD</text>
  <text x="870" y="342" text-anchor="middle" class="box-sub">Alerte affichée</text>
  <text x="870" y="358" text-anchor="middle" class="box-sub">niveau critique</text>
  <line x1="870" y1="190" x2="870" y2="285" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrg)"/>
  <circle cx="870" cy="240" r="14" fill="#1d4ed8"/>
  <text x="870" y="245" text-anchor="middle" class="step-num">3</text>

  <!-- Retour vers portail -->
  <rect x="410" y="290" width="180" height="80" rx="10" fill="#0891b2"/>
  <text x="500" y="322" text-anchor="middle" class="box-label">PORTAIL</text>
  <text x="500" y="342" text-anchor="middle" class="box-sub">Page Alertes</text>
  <text x="500" y="358" text-anchor="middle" class="box-sub">alerte remontée</text>
  <line x1="775" y1="330" x2="595" y2="330" stroke="#0891b2" stroke-width="3" marker-end="url(#arrg)"/>
  <circle cx="685" cy="330" r="14" fill="#0891b2"/>
  <text x="685" y="335" text-anchor="middle" class="step-num">4</text>

  <!-- IA Claude -->
  <rect x="40" y="290" width="180" height="80" rx="10" fill="#7c3aed"/>
  <text x="130" y="322" text-anchor="middle" class="box-label">IA CLAUDE</text>
  <text x="130" y="342" text-anchor="middle" class="box-sub">Analyse l'alerte</text>
  <text x="130" y="358" text-anchor="middle" class="box-sub">en français</text>
  <line x1="405" y1="330" x2="225" y2="330" stroke="#7c3aed" stroke-width="3" marker-end="url(#arr)"/>
  <circle cx="315" cy="330" r="14" fill="#7c3aed"/>
  <text x="315" y="335" text-anchor="middle" class="step-num">5</text>

  <!-- Légende des étapes -->
  <rect x="40" y="420" width="920" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="60" y="448" class="step">1. Kali lance hydra : brute-force sur le formulaire de login du portail (des dizaines de tentatives)</text>
  <text x="60" y="472" class="step">2. nginx logge chaque échec → l'agent Wazuh envoie ces logs au manager Wazuh</text>
  <text x="60" y="496" class="step">3. Wazuh détecte le pattern (6+ échecs en 30s) → génère une alerte critique affichée dans le dashboard</text>
  <text x="60" y="520" class="step">4. L'intégration custom envoie l'alerte au portail (POST /api/alerte) → 5. Claude l'analyse et recommande une action</text>
</svg>
