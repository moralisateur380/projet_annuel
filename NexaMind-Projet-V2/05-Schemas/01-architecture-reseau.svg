<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a1a2e; }
      .label { font-size: 13px; fill: #ffffff; font-weight: 600; }
      .sublabel { font-size: 10px; fill: #cbd5e1; }
      .ip { font-size: 11px; fill: #2dd4bf; font-family: 'Courier New', monospace; }
      .zone-label { font-size: 12px; font-weight: 700; fill: #64748b; text-transform: uppercase; }
      .note { font-size: 11px; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="1000" height="760" fill="#f8fafc"/>

  <!-- Titre -->
  <text x="500" y="36" text-anchor="middle" class="title">NexaMind — Architecture Réseau</text>
  <text x="500" y="56" text-anchor="middle" class="note">Serveur dédié OVH Kimsufi · Proxmox VE 9 · 51.77.52.56</text>

  <!-- Internet -->
  <ellipse cx="500" cy="100" rx="70" ry="26" fill="#1e293b"/>
  <text x="500" y="105" text-anchor="middle" class="label">Internet</text>

  <!-- Ligne Internet -> pfSense -->
  <line x1="500" y1="126" x2="500" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="148" class="ip">vmbr0 (WAN)</text>

  <!-- pfSense -->
  <rect x="380" y="162" width="240" height="60" rx="8" fill="#dc2626"/>
  <text x="500" y="186" text-anchor="middle" class="label">pfSense (VM 100)</text>
  <text x="500" y="202" text-anchor="middle" class="sublabel">Firewall · NAT · OpenVPN</text>
  <text x="500" y="215" text-anchor="middle" class="ip">WAN 192.168.10.1 · LAN 192.168.20.1</text>

  <!-- VPN tunnel -->
  <rect x="700" y="166" width="180" height="52" rx="8" fill="#7c3aed"/>
  <text x="790" y="188" text-anchor="middle" class="label">VPN OpenVPN</text>
  <text x="790" y="204" text-anchor="middle" class="ip">10.10.10.0/24</text>
  <line x1="620" y1="192" x2="700" y2="192" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>

  <!-- Ligne pfSense -> LAN bus -->
  <line x1="500" y1="222" x2="500" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="245" class="ip">vmbr2 (LAN)</text>

  <!-- LAN zone label -->
  <text x="60" y="290" class="zone-label">Réseau LAN — 192.168.20.0/24</text>

  <!-- LAN bus line -->
  <line x1="60" y1="300" x2="940" y2="300" stroke="#cbd5e1" stroke-width="3"/>

  <!-- ===== Première rangée de VM ===== -->
  <!-- AD -->
  <line x1="140" y1="300" x2="140" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="60" y="342" width="160" height="64" rx="8" fill="#0891b2"/>
  <text x="140" y="366" text-anchor="middle" class="label">Active Directory</text>
  <text x="140" y="381" text-anchor="middle" class="sublabel">srv-ad-1 (VM 104)</text>
  <text x="140" y="396" text-anchor="middle" class="ip">192.168.20.10</text>

  <!-- Passbolt -->
  <line x1="320" y1="300" x2="320" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="240" y="342" width="160" height="64" rx="8" fill="#0891b2"/>
  <text x="320" y="366" text-anchor="middle" class="label">Passbolt</text>
  <text x="320" y="381" text-anchor="middle" class="sublabel">srv-passbolt-1 (VM 103)</text>
  <text x="320" y="396" text-anchor="middle" class="ip">coffre mots de passe</text>

  <!-- Web -->
  <line x1="500" y1="300" x2="500" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="420" y="342" width="160" height="64" rx="8" fill="#16a34a"/>
  <text x="500" y="366" text-anchor="middle" class="label">Serveur Web</text>
  <text x="500" y="381" text-anchor="middle" class="sublabel">srv-web-1 (VM 200) NEW</text>
  <text x="500" y="396" text-anchor="middle" class="ip">Portail NexaMind</text>

  <!-- Wazuh -->
  <line x1="680" y1="300" x2="680" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="600" y="342" width="160" height="64" rx="8" fill="#ea580c"/>
  <text x="680" y="366" text-anchor="middle" class="label">SOC Wazuh</text>
  <text x="680" y="381" text-anchor="middle" class="sublabel">srv-wazuh-1 (VM 201) NEW</text>
  <text x="680" y="396" text-anchor="middle" class="ip">SIEM + détection</text>

  <!-- Kali -->
  <line x1="860" y1="300" x2="860" y2="340" stroke="#94a3b8" stroke-width="2"/>
  <rect x="780" y="342" width="160" height="64" rx="8" fill="#1e293b"/>
  <text x="860" y="366" text-anchor="middle" class="label">Kali (attaque)</text>
  <text x="860" y="381" text-anchor="middle" class="sublabel">srv-kali-1 (VM 202) NEW</text>
  <text x="860" y="396" text-anchor="middle" class="ip">Red Team</text>

  <!-- ===== Deuxième rangée ===== -->
  <!-- Client Win -->
  <line x1="230" y1="300" x2="230" y2="450" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <rect x="150" y="452" width="160" height="64" rx="8" fill="#2563eb"/>
  <text x="230" y="476" text-anchor="middle" class="label">Client Windows</text>
  <text x="230" y="491" text-anchor="middle" class="sublabel">client-win-1 (VM 106)</text>
  <text x="230" y="506" text-anchor="middle" class="ip">joint au domaine</text>

  <!-- Templates -->
  <rect x="400" y="452" width="340" height="64" rx="8" fill="#94a3b8"/>
  <text x="570" y="476" text-anchor="middle" class="label">Templates (pour cloner)</text>
  <text x="570" y="491" text-anchor="middle" class="sublabel">srv-debian-template (101) · srv-win10-template (102)</text>
  <text x="570" y="506" text-anchor="middle" class="sublabel">créés par Victor</text>

  <!-- ===== Flux d'attaque (annotations) ===== -->
  <rect x="60" y="560" width="880" height="170" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="80" y="588" class="zone-label" fill="#dc2626">Scénario de démo : attaque → détection</text>

  <text x="80" y="615" class="note">1. Kali (202) lance un brute-force sur le portail web (200) — hydra sur le formulaire de login</text>
  <text x="80" y="638" class="note">2. Le portail logge les échecs de connexion (via nginx access.log)</text>
  <text x="80" y="661" class="note">3. L'agent Wazuh sur le serveur web envoie les logs au SOC Wazuh (201)</text>
  <text x="80" y="684" class="note">4. Wazuh détecte le brute-force et génère une alerte (règle custom niveau 10)</text>
  <text x="80" y="707" class="note">5. L'alerte remonte dans le portail NexaMind + l'IA Claude l'analyse en français</text>
</svg>
